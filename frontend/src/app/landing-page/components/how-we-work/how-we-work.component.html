<section class="how-we-work-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">{{ 'LANDING.HOW_TITLE' | translate }}</h2>
      <p class="section-subtitle">{{ 'LANDING.HOW_SUBTITLE' | translate }}</p>
    </div>

    <div class="process-steps">
      @for (step of processSteps; track step.stepNumber; let i = $index) {
        <div class="step-item">
          <div class="step-number">{{ step.stepNumber }}</div>
          <div class="step-icon">
            <img [src]="step.icon" [alt]="(step.titleKey | translate) + ' icon'" />
          </div>
          <h3 class="step-title">{{ step.titleKey | translate }}</h3>
          <p class="step-description">{{ step.descKey | translate }}</p>
          @if (i < processSteps.length - 1) {
            <div class="step-connector"></div>
          }
        </div>
      }
    </div>
  </div>
</section>
