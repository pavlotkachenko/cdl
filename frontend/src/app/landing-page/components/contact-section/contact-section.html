<section class="contact-section">
  <div class="container">
    <h2>Contact Us</h2>
    <p class="subtitle">Have questions? We'd love to hear from you.</p>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
      <div class="form-group">
        <label for="name">Name *</label>
        <input
          type="text"
          id="name"
          formControlName="name"
          class="form-control"
          [class.error]="submitted && f['name'].errors"
          placeholder="Enter your name"
        />
        <div *ngIf="submitted && f['name'].errors" class="error-message">
          <span *ngIf="f['name'].errors['required']">Name is required</span>
          <span *ngIf="f['name'].errors['minlength']">Name must be at least 2 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          [class.error]="submitted && f['email'].errors"
          placeholder="Enter your email"
        />
        <div *ngIf="submitted && f['email'].errors" class="error-message">
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone *</label>
        <input
          type="tel"
          id="phone"
          formControlName="phone"
          class="form-control"
          [class.error]="submitted && f['phone'].errors"
          placeholder="Enter your phone number"
        />
        <div *ngIf="submitted && f['phone'].errors" class="error-message">
          <span *ngIf="f['phone'].errors['required']">Phone is required</span>
          <span *ngIf="f['phone'].errors['pattern']">Please enter a valid phone number (10-15 digits)</span>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Message *</label>
        <textarea
          id="message"
          formControlName="message"
          class="form-control"
          [class.error]="submitted && f['message'].errors"
          rows="5"
          placeholder="Enter your message"
        ></textarea>
        <div *ngIf="submitted && f['message'].errors" class="error-message">
          <span *ngIf="f['message'].errors['required']">Message is required</span>
          <span *ngIf="f['message'].errors['minlength']">Message must be at least 10 characters</span>
        </div>
      </div>

      <button type="submit" class="btn-submit">Send Message</button>
    </form>
  </div>
</section>
