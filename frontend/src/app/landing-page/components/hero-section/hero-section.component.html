<div class="hero-section" [style.background-image]="'url(' + heroImages[currentIndex] + ')'">
  <div class="hero-overlay">
    <h1 [innerHTML]="headlineKeys[currentIndex] | translate"></h1>
    <button mat-flat-button color="accent" routerLink="/signup/carrier">{{ 'LANDING.GET_STARTED' | translate }}</button>
    <div class="stats">
      <div class="stat">
        <p class="accent">{{ 'LANDING.STAT_FREE' | translate }}</p>
        <p>{{ 'LANDING.STAT_FREE_DESC' | translate }}</p>
      </div>
      <div class="stat">
        <p class="accent">{{ 'LANDING.STAT_REVIEWS' | translate }}</p>
        <p>{{ 'LANDING.STAT_REVIEWS_DESC' | translate }}</p>
      </div>
    </div>
  </div>
</div>
