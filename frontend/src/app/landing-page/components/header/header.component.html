<header class="header" [class.scrolled]="isScrolled">
  <div class="header-container">
    <!-- Logo -->
    <div class="logo-section">
      <img src="assets/icons/logo.svg" alt="TruckSafe Logo" class="logo">
      <span class="brand-name">TruckSafe</span>
    </div>

    <!-- Navigation -->
    <nav class="navigation" [class.mobile-open]="isMobileMenuOpen">
      <a 
        *ngFor="let link of navigationLinks"
        (click)="scrollToSection(link.url)"
        class="nav-link">
        {{ link.label }}
      </a>
    </nav>

    <!-- Actions -->
    <div class="header-actions">
      <button mat-button (click)="navigateToLogin()" class="login-button">
        Login
      </button>
      <button mat-raised-button color="primary" (click)="navigateToSignup()" class="signup-button">
        Get Started
      </button>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" (click)="toggleMobileMenu()" mat-icon-button>
      <mat-icon>{{ isMobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>
</header>
