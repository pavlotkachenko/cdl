<header class="header" [class.scrolled]="isScrolled">
  <div class="header-container">
    <!-- Logo -->
    <div class="logo-section">
      <img src="assets/icons/logo.svg" alt="TruckSafe Logo" class="logo">
      <span class="brand-name">TruckSafe</span>
    </div>

    <!-- Navigation -->
    <nav class="navigation" [class.mobile-open]="isMobileMenuOpen">
      @for (link of navigationLinks; track link.url) {
        <a (click)="scrollToSection(link.url)" class="nav-link">
          {{ link.labelKey | translate }}
        </a>
      }
    </nav>

    <!-- Actions -->
    <div class="header-actions">
      <app-language-switcher theme="light"></app-language-switcher>
      <button mat-button (click)="navigateToLogin()" class="login-button">
        {{ 'LANDING.LOGIN' | translate }}
      </button>
      <button mat-raised-button color="primary" (click)="navigateToSignup()" class="signup-button">
        {{ 'LANDING.GET_STARTED' | translate }}
      </button>
    </div>

    <!-- Mobile Language Switcher + Menu Toggle -->
    <div class="mobile-actions">
      <app-language-switcher theme="light"></app-language-switcher>
      <button class="mobile-menu-toggle" (click)="toggleMobileMenu()" mat-icon-button aria-label="Toggle menu">
        <mat-icon>{{ isMobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
      </button>
    </div>
  </div>
</header>
