<!-- Notification Bell Component Template -->
<button 
  mat-icon-button 
  [matMenuTriggerFor]="notificationMenu"
  matTooltip="Notifications"
  class="notification-bell">
  <mat-icon 
    [matBadge]="unreadCount" 
    [matBadgeHidden]="unreadCount === 0"
    matBadgeColor="warn"
    matBadgeSize="small">
    notifications
  </mat-icon>
</button>

<mat-menu #notificationMenu="matMenu" class="notification-menu" xPosition="before">
  
  <!-- Header -->
  <div class="notification-header" (click)="$event.stopPropagation()">
    <h3>Notifications</h3>
    <div class="header-actions">
      <button 
        mat-button 
        class="mark-read-btn" 
        (click)="markAllAsRead()" 
        *ngIf="unreadCount > 0">
        Mark all read
      </button>
    </div>
  </div>

  <mat-divider></mat-divider>

  <!-- Notifications List -->
  <div class="notifications-list" (click)="$event.stopPropagation()">
    
    <!-- Recent Notifications -->
    <div *ngIf="recentNotifications.length > 0">
      <button 
        mat-menu-item 
        *ngFor="let notification of recentNotifications"
        class="notification-item"
        [class.unread]="!notification.read"
        (click)="onNotificationClick(notification)">
        
        <div class="notification-icon" [style.background-color]="getColor(notification.type)">
          <mat-icon>{{ getIcon(notification.type) }}</mat-icon>
        </div>
        
        <div class="notification-content">
          <div class="notification-title">{{ notification.title }}</div>
          <div class="notification-message">{{ notification.message }}</div>
          <div class="notification-time">{{ formatTime(notification.timestamp) }}</div>
        </div>

        <div class="notification-indicator" *ngIf="!notification.read"></div>
      </button>
    </div>

    <!-- Empty State -->
    <div class="empty-notifications" *ngIf="recentNotifications.length === 0">
      <mat-icon>notifications_none</mat-icon>
      <p>No notifications yet</p>
    </div>
  </div>

  <mat-divider></mat-divider>

  <!-- Footer -->
  <div class="notification-footer" (click)="$event.stopPropagation()">
    <button mat-button color="primary" (click)="viewAllNotifications()" class="view-all-btn">
      View All Notifications
      <mat-icon>arrow_forward</mat-icon>
    </button>
  </div>

</mat-menu>
