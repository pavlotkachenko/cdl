<div class="reset-password-container">
  <mat-card class="reset-password-card">
    <mat-card-header>
      <mat-card-title>
        <h1>Reset Password</h1>
      </mat-card-title>
      <mat-card-subtitle>
        Enter your new password
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Success Message -->
      <div *ngIf="successMessage" class="success-alert">
        <mat-icon>check_circle</mat-icon>
        <div class="message-content">
          <h3>Password Reset!</h3>
          <p>{{ successMessage }}</p>
          <p class="small-text">You will be redirected to the login page shortly.</p>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage && !successMessage" class="error-alert">
        <mat-icon>error</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Token Error - show link to request new reset -->
      <div *ngIf="tokenError && !successMessage" class="token-error-actions">
        <button mat-raised-button color="primary" class="full-width" routerLink="/forgot-password">
          <mat-icon>email</mat-icon>
          Request New Reset Link
        </button>
        <button mat-button class="full-width" routerLink="/login">
          <mat-icon>arrow_back</mat-icon>
          Back to Login
        </button>
      </div>

      <!-- Reset Form -->
      <form *ngIf="!tokenError && !successMessage" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>New Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter new password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="resetForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="resetForm.get('password')?.hasError('minlength')">Password must be at least 6 characters</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" formControlName="confirmPassword" placeholder="Confirm new password">
          <button mat-icon-button matSuffix type="button" (click)="hideConfirmPassword = !hideConfirmPassword">
            <mat-icon>{{ hideConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="resetForm.get('confirmPassword')?.hasError('required')">Please confirm your password</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width submit-button" [disabled]="loading || resetForm.invalid">
          <mat-spinner *ngIf="loading" diameter="20" class="button-spinner"></mat-spinner>
          <span *ngIf="!loading">Reset Password</span>
          <span *ngIf="loading">Resetting...</span>
        </button>

        <div class="back-to-login">
          <button mat-button type="button" routerLink="/login" class="full-width">
            <mat-icon>arrow_back</mat-icon>
            Back to Login
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
