<!-- LOGIN COMPONENT TEMPLATE -->
<!-- Location: frontend/src/app/features/auth/login/login.component.html -->
<!-- ============================================ -->

<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        <h1>Welcome Back</h1>
      </mat-card-title>
      <mat-card-subtitle>Sign in to your account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Error Message Alert -->
      <div *ngIf="errorMessage" class="error-alert">
        <mat-icon>error</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Email Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input
            matInput
            type="email"
            inputmode="email"
            formControlName="email"
            placeholder="your.email@example.com"
            autocomplete="email"
            [class.error]="hasError('email', 'email')"
          />
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="getErrorMessage('email')">
            {{ getErrorMessage('email') }}
          </mat-error>
        </mat-form-field>

        <!-- Password Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="'Hide password'"
            [attr.aria-pressed]="hidePassword"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="getErrorMessage('password')">
            {{ getErrorMessage('password') }}
          </mat-error>
        </mat-form-field>

        <!-- Remember Me & Forgot Password -->
        <div class="form-options">
          <mat-checkbox formControlName="rememberMe">
            Remember me
          </mat-checkbox>
          <a routerLink="/forgot-password" class="forgot-password-link">
            Forgot password?
          </a>
        </div>

        <!-- Submit Button -->
        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width submit-button"
          [disabled]="loading || loginForm.invalid"
        >
          <mat-spinner *ngIf="loading" diameter="20" class="button-spinner"></mat-spinner>
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading">Signing in...</span>
        </button>
      </form>

      <!-- Divider -->
      <mat-divider class="divider"></mat-divider>
      <p class="divider-text">OR</p>

      <!-- Biometric Login (shown only when enrolled) -->
      <div *ngIf="biometricEnrolled" class="social-login">
        <button
          mat-stroked-button
          type="button"
          class="full-width social-button"
          (click)="loginWithBiometric()"
          [disabled]="biometricLoading || loading"
        >
          <mat-icon>fingerprint</mat-icon>
          <span *ngIf="!biometricLoading">Sign in with biometrics</span>
          <span *ngIf="biometricLoading">Verifying…</span>
        </button>
      </div>

      <!-- Social Login -->
      <div class="social-login">
        <button
          mat-stroked-button
          type="button"
          class="full-width social-button google-button"
          (click)="loginWithGoogle()"
          [disabled]="loading"
        >
          <mat-icon svgIcon="google"></mat-icon>
          Continue with Google
        </button>

        <button
          mat-stroked-button
          type="button"
          class="full-width social-button facebook-button"
          (click)="loginWithFacebook()"
          [disabled]="loading"
        >
          <mat-icon svgIcon="facebook"></mat-icon>
          Continue with Facebook
        </button>
      </div>

      <!-- Register Link -->
      <div class="register-link">
        <p>
          Don't have an account?
          <a routerLink="/register">Sign up</a>
        </p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
