<app-landing-header></app-landing-header>

<section class="contact-page">
  <div class="contact-layout">
    <!-- Left: Contact Information -->
    <div class="contact-info-side">
      <div class="breadcrumb">
        <a routerLink="/">Main</a> / <span>Contact us</span>
      </div>

      <h1>Contact us</h1>

      <div class="info-grid">
        <div class="info-column">
          <div class="info-block">
            <h3>Customer Support</h3>
            <a class="info-link" href="tel:+18669311192">
              <img src="assets/icons/phone.svg" alt="Phone" class="info-icon">
              <span>+1 866-931-1192</span>
            </a>
          </div>

          <div class="info-block">
            <h3>24/7 Call Center</h3>
            <a class="info-link" href="tel:+18669311192">
              <img src="assets/icons/phone.svg" alt="Phone" class="info-icon">
              <span>+1 866-931-1192<br>(For PLUS members only)</span>
            </a>
          </div>

          <div class="info-block">
            <h3>We speak</h3>
            <div class="flags">
              <img *ngFor="let flag of flagNames"
                   [src]="'assets/images/flags/' + flag + '.png'"
                   [alt]="flag"
                   [class.ukraine]="flag === 'ukraine'">
            </div>
          </div>
        </div>

        <div class="info-column">
          <div class="info-block">
            <h3>Email</h3>
            <a class="info-link" href="mailto:office&#64;cdl-advisor.com" target="_blank" rel="noopener noreferrer">
              <img src="assets/icons/envelope.svg" alt="Email" class="info-icon info-icon--envelope">
              <span>office&#64;cdl-advisor.com</span>
            </a>
          </div>

          <div class="info-block">
            <h3>Address</h3>
            <p class="info-link">
              <img src="assets/icons/place-point.svg" alt="Location" class="info-icon info-icon--place">
              <span>20 W, Biesterfield Rd, Elk<br>Grove Village, IL 60007</span>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Hero Image -->
    <div class="contact-image">
      <h2>We are here<br>24/7</h2>
    </div>
  </div>
</section>

<!-- Map Section -->
<section class="map-section">
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2961.5!2d-87.98!3d42.01!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x880fb0a7b5d0e0e3%3A0x0!2s20+W+Biesterfield+Rd%2C+Elk+Grove+Village%2C+IL+60007!5e0!3m2!1sen!2sus!4v1"
    width="100%"
    height="400"
    style="border:0;"
    allowfullscreen=""
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</section>

<app-landing-footer></app-landing-footer>
