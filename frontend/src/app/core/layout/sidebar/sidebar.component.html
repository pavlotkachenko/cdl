<!-- Sidebar Navigation -->
<div class="sidebar-wrapper">

  <!-- User Profile Section -->
  <div class="sidebar-profile">
    <div class="profile-avatar">
      <mat-icon>person</mat-icon>
    </div>
    <div class="profile-info">
      <span class="profile-name">{{ userName }}</span>
      <span class="profile-role">{{ userRole | titlecase }}</span>
    </div>
  </div>

  <mat-divider></mat-divider>

  <!-- Navigation -->
  <mat-nav-list class="sidebar-nav">
    @for (item of navigation; track item.link) {
      @if (item.dividerBefore) {
        <mat-divider class="nav-divider"></mat-divider>
      }
      <a [routerLink]="item.link"
         mat-list-item
         routerLinkActive="active"
         [routerLinkActiveOptions]="{exact: item.name === 'NAV.DASHBOARD'}">
        @if (item.badge && item.badge > 0) {
          <mat-icon [matBadge]="item.badge" matBadgeColor="warn" matBadgeSize="small">{{ item.icon }}</mat-icon>
        } @else {
          <mat-icon>{{ item.icon }}</mat-icon>
        }
        <span>{{ item.name | translate }}</span>
      </a>
    }
  </mat-nav-list>
</div>
